<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Webhook Manager — DOY Coder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    #canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 0;
    }

    .bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at top left, #3a0000 0%, #1a0000 40%, #0a0a0a 100%);
      z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* ── Back link ── */
    .back {
      display: inline-flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.4);
      font-size: 0.82rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back:hover { color: #ff6060; }

    /* ── Page title ── */
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: linear-gradient(90deg, #ff6060, #ff2020, #cc0000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: rgba(255,255,255,0.35); font-size: 0.82rem; margin-top: 2px; }

    /* ── Glass card ── */
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 18px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(180,0,0,0.15);
      padding: 24px 28px;
    }

    .card-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #cc2222;
      margin-bottom: 16px;
    }

    /* ── Inputs ── */
    label {
      display: block;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      margin-top: 14px;
    }
    label:first-of-type { margin-top: 0; }

    input[type="text"], input[type="url"], textarea, select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input[type="text"]:focus,
    input[type="url"]:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(255,80,80,0.6);
    }
    textarea { resize: vertical; min-height: 90px; }
    select option { background: #1a0000; }

    /* ── Webhook URL row ── */
    .url-row { display: flex; gap: 10px; align-items: flex-end; }
    .url-row input { flex: 1; }

    /* ── Saved webhooks list ── */
    .webhook-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .webhook-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,80,80,0.12);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .webhook-item:hover { background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.3); }
    .webhook-item.active { border-color: rgba(255,80,80,0.6); background: rgba(255,80,80,0.1); }
    .webhook-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4040; flex-shrink: 0; }
    .webhook-name { font-size: 0.88rem; flex: 1; }
    .webhook-url-preview { font-size: 0.72rem; color: rgba(255,255,255,0.3); flex: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-del {
      background: none; border: none; color: rgba(255,80,80,0.4);
      cursor: pointer; font-size: 1rem; padding: 0 4px;
      transition: color 0.2s;
    }
    .btn-del:hover { color: #ff4040; }

    /* ── Collapsible advanced ── */
    .advanced-toggle {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      user-select: none;
      color: rgba(255,255,255,0.45);
      font-size: 0.82rem;
      padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 6px;
      transition: color 0.2s;
    }
    .advanced-toggle:hover { color: #ff6060; }
    .toggle-arrow {
      font-size: 0.75rem;
      transition: transform 0.3s;
      display: inline-block;
    }
    .toggle-arrow.open { transform: rotate(90deg); }
    .advanced-body {
      display: none;
      margin-top: 14px;
    }
    .advanced-body.open { display: block; }

    .avatar-row { display: flex; gap: 12px; }
    .avatar-row > div { flex: 1; }

    /* ── Checkboxes / options ── */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 4px;
    }
    .opt-item {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,80,80,0.12);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .opt-item:hover { background: rgba(255,80,80,0.07); }
    .opt-item input[type="checkbox"] {
      accent-color: #ff3030;
      width: 15px; height: 15px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .opt-label { font-size: 0.82rem; color: rgba(255,255,255,0.7); }
    .opt-badge {
      font-size: 0.65rem;
      background: rgba(255,40,40,0.25);
      color: #ff8080;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: auto;
    }

    /* ── Embeds ── */
    .embed-section { margin-top: 6px; }
    .embed-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .embed-color-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
    input[type="color"] {
      width: 40px; height: 36px;
      border: none; border-radius: 8px;
      background: none; cursor: pointer; padding: 0;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      border-radius: 10px;
      border: none;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #cc0000, #880000);
      color: #fff;
      box-shadow: 0 4px 16px rgba(200,0,0,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200,0,0,0.45);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,80,80,0.25);
      color: rgba(255,255,255,0.7);
    }
    .btn-ghost:hover { background: rgba(255,80,80,0.1); color: #fff; }
    .btn-sm { padding: 7px 14px; font-size: 0.8rem; }

    .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

    /* ── Send status ── */
    #send-status {
      font-size: 0.82rem;
      padding: 8px 14px;
      border-radius: 8px;
      display: none;
      margin-top: 10px;
    }
    #send-status.success { background: rgba(0,200,80,0.12); border: 1px solid rgba(0,200,80,0.3); color: #40ff80; display: block; }
    #send-status.error { background: rgba(255,40,40,0.12); border: 1px solid rgba(255,40,40,0.3); color: #ff6060; display: block; }
    #send-status.loading { background: rgba(255,200,0,0.08); border: 1px solid rgba(255,200,0,0.2); color: #ffcc44; display: block; }

    /* ── Log ── */
    .log-list { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: rgba(255,60,60,0.3); border-radius: 4px; }

    .log-item {
      display: flex; flex-direction: column; gap: 3px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,80,80,0.1);
      border-radius: 10px;
      padding: 10px 14px;
    }
    .log-item.ok { border-left: 3px solid #40ff80; }
    .log-item.fail { border-left: 3px solid #ff4040; }
    .log-top { display: flex; align-items: center; gap: 10px; }
    .log-badge {
      font-size: 0.68rem; padding: 2px 8px; border-radius: 4px;
      font-weight: 700; letter-spacing: 0.5px;
    }
    .log-badge.ok { background: rgba(0,200,80,0.2); color: #40ff80; }
    .log-badge.fail { background: rgba(255,40,40,0.2); color: #ff6060; }
    .log-time { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-left: auto; }
    .log-webhook { font-size: 0.78rem; color: rgba(255,255,255,0.55); }
    .log-preview { font-size: 0.82rem; color: rgba(255,255,255,0.7); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-empty { color: rgba(255,255,255,0.25); font-size: 0.85rem; text-align: center; padding: 20px; }

    /* ── SNS ── */
    .sns-bar {
      position: fixed; bottom: 28px; right: 28px;
      z-index: 100; display: flex; flex-direction: column; gap: 14px; align-items: center;
    }
    .sns-bar a {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      transition: transform 0.25s, background 0.25s, box-shadow 0.25s;
      text-decoration: none;
    }
    .sns-bar a:hover { transform: scale(1.18); background: rgba(255,255,255,0.14); box-shadow: 0 4px 20px rgba(255,255,255,0.1); }
    .sns-bar a svg { width: 20px; height: 20px; fill: #fff; }
  </style>
</head>

<script>
// ── Particles ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();
for (let i = 0; i < 60; i++) {
  particles.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight,
    r: Math.random()*2+0.5, dx: (Math.random()-.5)*.35, dy: (Math.random()-.5)*.35,
    color: ['rgba(255,40,40,','rgba(200,0,0,','rgba(255,100,100,'][Math.floor(Math.random()*3)],
    alpha: Math.random()*.5+.15 });
}
function draw() {
  ctx.clearRect(0,0,W,H);
  for (const p of particles) {
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = p.color+p.alpha+')'; ctx.fill();
    p.x+=p.dx; p.y+=p.dy;
    if(p.x<0||p.x>W) p.dx*=-1; if(p.y<0||p.y>H) p.dy*=-1;
  }
  requestAnimationFrame(draw);
}
draw();

// ── State ──
let webhooks = JSON.parse(localStorage.getItem('doy_webhooks') || '[]');
let logs = JSON.parse(localStorage.getItem('doy_logs') || '[]');
let selectedWebhook = null;

// ── Advanced toggle ──
function toggleAdvanced() {
  const body = document.getElementById('adv-body');
  const arrow = document.getElementById('adv-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

// Embed toggle
document.getElementById('opt-embed').addEventListener('change', function() {
  document.getElementById('embed-section').style.display = this.checked ? 'block' : 'none';
});

// ── Save Webhook ──
function saveWebhook() {
  const name = document.getElementById('new-name').value.trim();
  const url = document.getElementById('new-url').value.trim();
  if (!name || !url) { alert('Name and URL are required.'); return; }
  if (!url.startsWith('https://discord.com/api/webhooks/')) { alert('Please enter a valid Discord Webhook URL.'); return; }
  webhooks.push({ id: Date.now(), name, url });
  localStorage.setItem('doy_webhooks', JSON.stringify(webhooks));
  document.getElementById('new-name').value = '';
  document.getElementById('new-url').value = '';
  renderWebhooks();
}

function deleteWebhook(id) {
  webhooks = webhooks.filter(w => w.id !== id);
  localStorage.setItem('doy_webhooks', JSON.stringify(webhooks));
  if (selectedWebhook && selectedWebhook.id === id) selectedWebhook = null;
  renderWebhooks();
}

function selectWebhook(id) {
  selectedWebhook = webhooks.find(w => w.id === id);
  document.querySelectorAll('.webhook-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.webhook-item[data-id="${id}"]`)?.classList.add('active');
  // sync select
  document.getElementById('target-webhook').value = id;
}

function renderWebhooks() {
  const list = document.getElementById('webhook-list');
  const sel = document.getElementById('target-webhook');
  sel.innerHTML = '<option value="">— Select a saved webhook —</option>';

  if (webhooks.length === 0) {
    list.innerHTML = '<div class="log-empty">No webhooks saved yet.</div>';
    return;
  }
  list.innerHTML = webhooks.map(w => `
    <div class="webhook-item" data-id="${w.id}" onclick="selectWebhook(${w.id})">
      <div class="webhook-dot"></div>
      <div class="webhook-name">${w.name}</div>
      <div class="webhook-url-preview">${w.url}</div>
      <button class="btn-del" onclick="event.stopPropagation(); deleteWebhook(${w.id})">✕</button>
    </div>
  `).join('');
  webhooks.forEach(w => {
    const opt = document.createElement('option');
    opt.value = w.id; opt.textContent = w.name;
    sel.appendChild(opt);
  });
}

// target select sync
document.getElementById('target-webhook').addEventListener('change', function() {
  const id = parseInt(this.value);
  if (id) selectWebhook(id);
});

// ── Send Webhook ──
async function sendWebhook() {
  const selId = parseInt(document.getElementById('target-webhook').value);
  const hook = webhooks.find(w => w.id === selId);
  if (!hook) { showStatus('error', 'Please select a webhook first.'); return; }

  const content = document.getElementById('msg-content').value.trim();
  const tts = document.getElementById('opt-tts').checked;
  const silent = document.getElementById('opt-silent').checked;
  const suppressEmbeds = document.getElementById('opt-suppress').checked;
  const mentionEveryone = document.getElementById('opt-mention-everyone').checked;
  const username = document.getElementById('adv-username').value.trim();
  const avatarUrl = document.getElementById('adv-avatar').value.trim();
  const useEmbed = document.getElementById('opt-embed').checked;

  if (!content && !useEmbed) { showStatus('error', 'Message content is empty.'); return; }

  // Build payload
  const payload = {};
  if (content) payload.content = mentionEveryone ? '@everyone ' + content : content;
  if (tts) payload.tts = true;
  if (username) payload.username = username;
  if (avatarUrl) payload.avatar_url = avatarUrl;

  // Flags
  let flags = 0;
  if (suppressEmbeds) flags |= 1 << 2;
  if (silent) flags |= 1 << 12;
  if (flags) payload.flags = flags;

  // Embed
  if (useEmbed) {
    const embed = {};
    const title = document.getElementById('emb-title').value.trim();
    const desc = document.getElementById('emb-desc').value.trim();
    const author = document.getElementById('emb-author').value.trim();
    const footer = document.getElementById('emb-footer').value.trim();
    const image = document.getElementById('emb-image').value.trim();
    const thumb = document.getElementById('emb-thumb').value.trim();
    const color = document.getElementById('emb-color').value;
    if (title) embed.title = title;
    if (desc) embed.description = desc;
    if (author) embed.author = { name: author };
    if (footer) embed.footer = { text: footer };
    if (image) embed.image = { url: image };
    if (thumb) embed.thumbnail = { url: thumb };
    embed.color = parseInt(color.replace('#',''), 16);
    payload.embeds = [embed];
  }

  showStatus('loading', 'Sending...');

  try {
    const res = await fetch(hook.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const preview = content || (useEmbed ? '[Embed]' : '');
    if (res.ok || res.status === 204) {
      showStatus('success', `✓ Sent successfully to "${hook.name}"`);
      addLog('ok', hook.name, preview);
    } else {
      const err = await res.json().catch(() => ({}));
      showStatus('error', `✗ Error ${res.status}: ${err.message || 'Unknown error'}`);
      addLog('fail', hook.name, preview);
    }
  } catch(e) {
    showStatus('error', `✗ Network error: ${e.message}`);
    addLog('fail', hook.name, content || '[Embed]');
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('send-status');
  el.className = type;
  el.textContent = msg;
  if (type === 'success') setTimeout(() => el.style.display = 'none', 4000);
}

function clearForm() {
  document.getElementById('msg-content').value = '';
  document.querySelectorAll('.options-grid input[type="checkbox"]').forEach(c => c.checked = false);
  document.getElementById('embed-section').style.display = 'none';
  document.getElementById('adv-username').value = '';
  document.getElementById('adv-avatar').value = '';
  document.getElementById('send-status').className = '';
  document.getElementById('send-status').style.display = 'none';
}

// ── Log ──
function addLog(status, webhookName, preview) {
  const now = new Date();
  const time = now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const date = now.toLocaleDateString('ja-JP');
  logs.unshift({ status, webhookName, preview, time, date });
  if (logs.length > 100) logs.pop();
  localStorage.setItem('doy_logs', JSON.stringify(logs));
  renderLogs();
}

function clearLog() {
  logs = [];
  localStorage.setItem('doy_logs', JSON.stringify(logs));
  renderLogs();
}

function renderLogs() {
  const list = document.getElementById('log-list');
  if (logs.length === 0) {
    list.innerHTML = '<div class="log-empty">No messages sent yet.</div>';
    return;
  }
  list.innerHTML = logs.map(l => `
    <div class="log-item ${l.status}">
      <div class="log-top">
        <span class="log-badge ${l.status}">${l.status === 'ok' ? '✓ SUCCESS' : '✗ FAILED'}</span>
        <span class="log-webhook">${l.webhookName}</span>
        <span class="log-time">${l.date} ${l.time}</span>
      </div>
      <div class="log-preview">${l.preview || '—'}</div>
    </div>
  `).join('');
}

// ── Init ──
renderWebhooks();
renderLogs();
</script>
</body>
</html>
